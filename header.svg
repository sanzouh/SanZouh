<svg width="820" height="160" viewBox="0 0 820 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .titlebar { fill: #161b22; }
      .dot-r { fill: #f85149; }
      .dot-y { fill: #d29922; }
      .dot-g { fill: #3fb950; }
      .text-muted { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-blue  { fill: #58a6ff; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-green { fill: #3fb950; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-purple{ fill: #c9b1ff; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-white { fill: #e6edf3; font-family: 'Courier New', monospace; font-size: 13px; }
      .text-cyan  { fill: #79c0ff; font-family: 'Courier New', monospace; font-size: 13px; }
      .name { fill: #58a6ff; font-family: 'Courier New', monospace; font-size: 26px; font-weight: bold; }
      .subtitle { fill: #8b949e; font-family: 'Courier New', monospace; font-size: 13px; }
      .cursor { fill: #58a6ff; }
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor { animation: blink 1.1s step-end infinite; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="820" height="160" rx="10" class="bg"/>

  <!-- Title bar -->
  <rect width="820" height="36" rx="10" class="titlebar"/>
  <rect y="26" width="820" height="10" class="titlebar"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" class="dot-r"/>
  <circle cx="40" cy="18" r="6" class="dot-y"/>
  <circle cx="60" cy="18" r="6" class="dot-g"/>

  <!-- Window title -->
  <text x="410" y="23" text-anchor="middle" class="text-muted">bash — ~/dev</text>

  <!-- Line 1: prompt + whoami -->
  <text x="20" y="65">
    <tspan class="text-green">~/dev</tspan>
    <tspan class="text-muted" dx="6">on</tspan>
    <tspan class="text-purple" dx="6">main</tspan>
    <tspan class="text-muted" dx="6">❯</tspan>
    <tspan class="text-blue" dx="6">cat</tspan>
    <tspan class="text-cyan" dx="6">README.md</tspan>
  </text>

  <!-- Line 2: name output -->
  <text x="20" y="100" class="name">Santa Herizo</text>

  <!-- Line 3: subtitle -->
  <text x="20" y="125">
    <tspan class="text-muted">$</tspan>
    <tspan class="text-blue" dx="8">whoami</tspan>
    <tspan class="text-muted" dx="8">→</tspan>
    <tspan class="text-white" dx="6">"Builder of scalable apps, coffee-driven coder"</tspan>
  </text>

  <!-- Line 4: role + location -->
  <text x="20" y="148">
    <tspan class="text-muted">#</tspan>
    <tspan class="text-muted" dx="6">Fullstack Developer</tspan>
    <tspan class="text-muted" dx="8">·</tspan>
    <tspan class="text-green" dx="8">Open to opportunities</tspan>
    <tspan class="text-muted" dx="8">·</tspan>
    <tspan class="text-muted" dx="8">Madagascar 🇲🇬</tspan>
  </text>

  <!-- Cursor -->
  <rect x="20" y="155" width="8" height="2" class="cursor"/>
</svg>
